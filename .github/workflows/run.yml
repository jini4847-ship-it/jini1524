name: etf-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * *"   # 한국 10시
    - cron: "05 * * *"   # 한국 14시

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: python main.py
